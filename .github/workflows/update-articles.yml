name: Update Articles

on:
  schedule:
    - cron: '0 23 * * *'  # 毎日 08:00 JST (= UTC 23:00)
  workflow_dispatch:       # 手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch articles
        run: python scripts/fetch_articles.py

      - name: Commit and push
        run: |
          git config user.name "MLinfo Bot"
          git config user.email "bot@mlinfo.app"
          git add web/data/articles.json
          git diff --staged --quiet || git commit -m "chore: update articles $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          git push
